<!DOCTYPE html>
<html>
<head>
<title>Instagram AI Content Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-4">Instagram AI Content Generator</h1>

<label>Niche</label>
<select id="nicheSelect" class="w-full border p-2 mb-3 rounded" onchange="handleCustomNiche()">
<option value="fitness">Fitness</option>
<option value="fashion">Fashion</option>
<option value="travel">Travel</option>
<option value="food">Food</option>
<option value="business">Business</option>
<option value="technology">Technology</option>
<option value="education">Education</option>
<option value="finance">Finance</option>
<option value="custom">Other (Custom)</option>
</select>

<input id="customNiche"
class="w-full border p-2 mb-3 rounded hidden"
placeholder="Enter your niche">

<label>Topic</label>
<input id="topic" class="w-full border p-2 mb-3 rounded" placeholder="daily workout">

<label>Tone</label>
<select id="tone" class="w-full border p-2 mb-4 rounded">
<option value="motivational">Motivational</option>
<option value="funny">Funny</option>
<option value="inspirational">Inspirational</option>
<option value="professional">Professional</option>
<option value="educational">Educational</option>
<option value="storytelling">Storytelling</option>
<option value="casual">Casual</option>
<option value="luxury">Luxury</option>
<option value="bold">Bold</option>
<option value="friendly">Friendly</option>
<option value="persuasive">Persuasive</option>
</select>

<button id="captionBtn" onclick="generateCaption()" class="bg-blue-600 text-white w-full p-3 rounded mb-2">
Generate Caption + Hook + CTA + Hashtags
</button>

<button id="reelBtn" onclick="generateReel()" class="bg-purple-600 text-white w-full p-3 rounded mb-2">
Generate Reel Script + Hook + CTA
</button>

<button id="calendarBtn" onclick="generateCalendar()" class="bg-green-600 text-white w-full p-3 rounded mb-4">
Generate Weekly Content Calendar
</button>

<h3 class="font-semibold mb-2">Result</h3>

<div id="result" class="bg-gray-100 p-4 rounded min-h-[120px]"></div>

<button onclick="regenerate()" class="bg-yellow-500 text-white w-full p-3 rounded mt-3">
Regenerate
</button>

<button onclick="copyResult()" class="bg-gray-800 text-white w-full p-3 rounded mt-3">
Copy Result
</button>

<button id="downloadBtn"
onclick="downloadCSV()"
class="bg-teal-600 text-white w-full p-3 rounded mt-3 hidden">
Download Calendar CSV
</button>

<h3 class="font-semibold mt-6">Recent Generations</h3>
<div id="history" class="text-sm mt-2"></div>

</div>

<script>

const API_URL = "https://instagram-ai-content-tool.onrender.com"
let lastAction = null

const buttons = [
document.getElementById("captionBtn"),
document.getElementById("reelBtn"),
document.getElementById("calendarBtn")
]

function handleCustomNiche(){

const select = document.getElementById("nicheSelect").value
const customField = document.getElementById("customNiche")

if(select === "custom"){
customField.classList.remove("hidden")
}else{
customField.classList.add("hidden")
}

}

function getNiche(){

let niche = document.getElementById("nicheSelect").value

if(niche === "custom"){
niche = document.getElementById("customNiche").value
}

return niche

}

function disableButtons(){
buttons.forEach(btn => btn.disabled = true)
}

function enableButtons(){
buttons.forEach(btn => btn.disabled = false)
}

function showLoading(){

document.getElementById("result").innerHTML =
`<div class="flex items-center gap-2">
<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-gray-800"></div>
<span>Generating content...</span>
</div>`

}

function formatText(text){
return text.replace(/\n/g,"<br>")
}

function saveHistory(text){

let history = JSON.parse(localStorage.getItem("history") || "[]")

history.unshift(text)
history = history.slice(0,5)

localStorage.setItem("history", JSON.stringify(history))

renderHistory()

}

function renderHistory(){

const history = JSON.parse(localStorage.getItem("history") || "[]")

const container = document.getElementById("history")

container.innerHTML = history.map(item =>
`<div class="border p-2 rounded mt-2">${item.substring(0,120)}...</div>`
).join("")

}

async function generateCaption(){

lastAction = generateCaption

disableButtons()
showLoading()

document.getElementById("downloadBtn").classList.add("hidden")

const niche = getNiche()
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_caption`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ niche, topic, tone })
})

const data = await response.json()

let caption = data.caption || JSON.stringify(data)

document.getElementById("result").innerHTML = formatText(caption)

saveHistory(caption)

enableButtons()

}

async function generateReel(){

lastAction = generateReel

disableButtons()
showLoading()

document.getElementById("downloadBtn").classList.add("hidden")

const niche = getNiche()
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_reel`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ niche, topic, tone })
})

const data = await response.json()

let text = data.reel_script || JSON.stringify(data)

document.getElementById("result").innerHTML = formatText(text)

saveHistory(text)

enableButtons()

}

async function generateCalendar(){

lastAction = generateCalendar

disableButtons()
showLoading()

const niche = getNiche()
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_calendar`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ niche, topic, tone })
})

const data = await response.json()

let text = data.calendar || JSON.stringify(data)

document.getElementById("result").innerHTML = formatText(text)

saveHistory(text)

document.getElementById("downloadBtn").classList.remove("hidden")

enableButtons()

}

function regenerate(){
if(lastAction){
lastAction()
}
}

function copyResult(){

const text = document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Copied to clipboard!")

}

function downloadCSV(){

if(lastAction !== generateCalendar){
alert("Please generate a Content Calendar first.")
return
}

const text = document.getElementById("result").innerText

const rows = text.split("\n").map(line => `"${line.replace(/"/g,'""')}"`)

const csv = rows.join("\n")

const blob = new Blob([csv], { type: "text/csv" })

const url = window.URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "content_calendar.csv"
a.click()

}

renderHistory()

</script>

</body>
</html>
