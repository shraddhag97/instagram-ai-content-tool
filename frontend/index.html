<!DOCTYPE html>
<html>
<head>
    <title>Instagram AI Content Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-4">Instagram AI Content Generator</h1>

<label>Niche</label>
<input id="niche" class="w-full border p-2 mb-3 rounded" placeholder="fitness">

<label>Topic</label>
<input id="topic" class="w-full border p-2 mb-3 rounded" placeholder="daily workout">

<label>Tone</label>
<select id="tone" class="w-full border p-2 mb-4 rounded">
<option value="motivational">motivational</option>
<option value="funny">funny</option>
<option value="inspirational">inspirational</option>
<option value="professional">professional</option>
</select>

<button onclick="generateCaption()" class="bg-blue-600 text-white w-full p-3 rounded mb-2">
Generate Caption
</button>

<button onclick="generateReel()" class="bg-purple-600 text-white w-full p-3 rounded mb-2">
Generate Reel Script
</button>

<button onclick="generateCalendar()" class="bg-green-600 text-white w-full p-3 rounded mb-4">
Generate Content Calendar
</button>

<h3 class="font-semibold mb-2">Result</h3>

<div id="result" class="bg-gray-100 p-4 rounded min-h-[120px]"></div>

<button onclick="copyResult()" class="bg-gray-800 text-white w-full p-3 rounded mt-4">
Copy Result
</button>

</div>


<script>

const API_URL = "https://instagram-ai-content-tool.onrender.com"

async function generateCaption(){

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_caption`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("result").innerText =
    data.caption || data.reel_script || data.calendar || JSON.stringify(data)

async function generateReel(){

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_reel`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("result").innerText =
    data.caption || data.reel_script || data.calendar || JSON.stringify(data)

async function generateCalendar(){

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch(`${API_URL}/generate_calendar`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("result").innerText =
    data.caption || data.reel_script || data.calendar || JSON.stringify(data)
    
function copyResult(){

const text = document.getElementById("result").innerText
navigator.clipboard.writeText(text)

alert("Copied to clipboard!")

}

</script>

</body>
</html>
