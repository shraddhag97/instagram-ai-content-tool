<!DOCTYPE html>
<html>

<head>
<title>Instagram AI Content Tool</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto mt-20 bg-white p-8 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-6">Instagram AI Content Generator</h1>

<label class="block mb-2 font-medium">Niche</label>
<input id="niche" class="w-full border p-2 rounded mb-4" placeholder="fitness">

<label class="block mb-2 font-medium">Topic</label>
<input id="topic" class="w-full border p-2 rounded mb-4" placeholder="morning workout motivation">

<label class="block mb-2 font-medium">Tone</label>
<select id="tone" class="w-full border p-2 rounded mb-6">
<option>motivational</option>
<option>educational</option>
<option>funny</option>
<option>inspirational</option>
</select>

<button onclick="generateCaption()" 
class="bg-blue-600 text-white px-4 py-2 rounded w-full">
Generate Caption
</button>

<button onclick="generateReel()" 
class="bg-purple-600 text-white px-4 py-2 rounded w-full mt-4">
Generate Reel Script
</button>

<button onclick="generateCalendar()" 
class="bg-green-600 text-white px-4 py-2 rounded w-full mt-4">
Generate Content Calendar
</button>

<div id="loading" class="hidden text-blue-600 mt-4 font-medium">
Generating content...
</div>

<h2 class="text-xl font-semibold mt-6">Result</h2>

<div id="result" class="bg-gray-100 p-4 rounded mt-4 whitespace-pre-wrap min-h-[120px]"></div>

<button onclick="copyResult()" 
class="bg-gray-800 text-white px-4 py-2 rounded w-full mt-4">
Copy Result
</button>

</div>

<script>

async function generateCaption(){

document.getElementById("loading").classList.remove("hidden")

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch("http://127.0.0.1:8000/generate_caption",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("loading").classList.add("hidden")
document.getElementById("result").innerText = data.caption

}

async function generateReel(){

document.getElementById("loading").classList.remove("hidden")

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch("http://127.0.0.1:8000/generate_reel",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("loading").classList.add("hidden")
document.getElementById("result").innerText = data.reel_script

}

async function generateCalendar(){

document.getElementById("loading").classList.remove("hidden")

const niche = document.getElementById("niche").value
const topic = document.getElementById("topic").value
const tone = document.getElementById("tone").value

const response = await fetch("http://127.0.0.1:8000/generate_calendar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
niche:niche,
topic:topic,
tone:tone
})
})

const data = await response.json()

document.getElementById("loading").classList.add("hidden")
document.getElementById("result").innerText = data.calendar

}

function copyResult(){

const text = document.getElementById("result").innerText
navigator.clipboard.writeText(text)

alert("Copied to clipboard!")

}

</script>

</body>
</html>
